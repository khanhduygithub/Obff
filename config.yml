# ═══════════════════════════════════════════════════════════════════
# BinScure config — KitPvP.jar
# Đã sửa cho đúng schema RootConfiguration của BinScure 1.8.4-SNAPSHOT
# ═══════════════════════════════════════════════════════════════════

sources:
  - input: KitPvP.jar
    output: KitPvP-obfuscated.jar

# Bắt buộc phải có key này dù không dùng (RootConfiguration.mappingFile: File?)
mappingFile: null

# Bắt buộc phải có key này dù không dùng (RootConfiguration.expiryDate: Instant?)
expiryDate: null

libraries: []

# Plugin Bukkit/Spigot: bắt buộc loại trừ class chính + mọi class implement
# listener/command mà server gọi qua reflection (onEnable, onCommand, @EventHandler).
# Nếu remap tên các class này, plugin sẽ load được nhưng Bukkit không tìm thấy
# entrypoint/handler đúng tên -> lỗi runtime không exception rõ ràng.
hardExclusions:
  - org/bukkit/
  - net/md_5/bungee/

# Rename: dictionary nên đủ entropy. "IlI1lIIl1lIlIlIl" chỉ có 3 ký tự
# khác nhau (I, l, 1) lặp lại -> tên sinh ra dễ trùng, gây xung đột khi
# số lượng class/method lớn. Mở rộng bộ ký tự nhìn-giống-nhau dễ gây nhầm
# (anti-reverse) nhưng vẫn cần đủ ký tự duy nhất.
remap:
  enabled: true
  dictionary: "Il1IlI1lI1lIlI1IlIl1IIllI1lIlI1l1IlIlI1I"
  classes: true
  methods: true
  fields: true
  localVariables: true
  aggressiveOverloading: false
  classPrefix: ""
  methodPrefix: ""
  fieldPrefix: ""
  localVariableName: "l"
  exclusions:
    - org/bukkit/
    - net/md_5/bungee/

# Strip debug info
sourceStrip:
  enabled: true
  lineNumbers: REMOVE

# Project là Java thuần (không Kotlin) -> để false là đúng, giữ nguyên
kotlinMetadata:
  enabled: false

# String encryption (AES-256-GCM custom hoặc thuật toán mặc định của
# BinScure - field thực tế chỉ có enabled/maxLength, không có "algorithm")
stringObfuscation:
  enabled: true
  maxLength: 10000

# Control flow flattening
flowObfuscation:
  enabled: true
  severity: 7
  mergeMethods: BLOAT_CLASSES
  arithmetic: true
  noverify: false
  java8: false

# MBA arithmetic substitution
arithmetic:
  enabled: true
  repeat: 3

# Number obfuscation
numberObfuscation:
  enabled: true
  floatingPoint: true

# Method call / field / variable indirection
indirection:
  enabled: true
  methodCalls: true
  fieldAccesses: true
  variableAccesses: true
  variableAccessesMinVariables: 5

# Method parameter obfuscation
methodParameter:
  enabled: true

# Optimisation pass
optimisation:
  enabled: true
  mutableEnumValues: false

# Anti-decompiler / anti-disassembler tricks
# antiAsm=true có thể làm ASM-based tool (kể cả Recaf) lỗi khi mở lại jar
# để re-obfuscate; nếu bạn chỉ build 1 lần để release thì giữ true là ổn.
crasher:
  enabled: true
  checksums: true
  decompilers: true
  antiAsm: true
  tools: true
  recaf: true

shuffleClasses: true
shuffleMethods: true
shuffleFields: true
ignoreClassPathNotFound: true
useJavaClassloader: false
resetLineProgress: true
printProgress: true
watermark: false
